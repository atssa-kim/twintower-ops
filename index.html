<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#A32D2D">
<title>트윈타워 상황대응</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Noto Sans KR',-apple-system,system-ui,sans-serif; background:#f1f5f9; color:#1e293b; }
  #app { max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh; background:#f1f5f9; display:flex; flex-direction:column; }
  .topbar { background:#A32D2D; color:#fff; padding:12px 14px; flex-shrink:0; }
  .topbar.cmd { background:#0C447C; }
  .demo-badge { background:rgba(255,255,255,.2); font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; }
  .live-badge { background:#16a34a; }
  .content { flex:1; overflow-y:auto; padding:14px; }
  .card { background:#fff; border-radius:14px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  label { font-size:12px; color:#64748b; font-weight:700; display:block; margin-bottom:5px; }
  input, select { width:100%; height:42px; border:1.5px solid #e2e8f0; border-radius:10px; padding:0 12px; font-size:15px; font-family:inherit; outline:none; background:#fff; }
  input:focus, select:focus { border-color:#A32D2D; }
  .btn { width:100%; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:800; font-family:inherit; cursor:pointer; color:#fff; }
  .btn-red { background:#A32D2D; } .btn-blue { background:#0C447C; } .btn-green { background:#16a34a; } .btn-gray { background:#475569; }
  .seg { display:flex; gap:6px; }
  .seg > button { flex:1; border:none; border-radius:9px; padding:10px 4px; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; background:#f1f5f9; color:#94a3b8; }
  .mode-opt { display:flex; align-items:center; gap:9px; padding:12px; border-radius:10px; margin-bottom:7px; cursor:pointer; font-size:14px; font-weight:700; border:2px solid transparent; background:#f1f5f9; color:#64748b; }
  .row { display:flex; align-items:center; gap:9px; padding:9px 2px; border-bottom:1px solid #f1f5f9; }
  .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
  .metric { flex:1; background:#f8fafc; border-radius:10px; padding:9px 8px; text-align:center; }
  .metric .v { font-size:20px; font-weight:800; }
  .bar { height:7px; background:#eef2f7; border-radius:4px; overflow:hidden; }
  .bar > div { height:100%; border-radius:4px; transition:width .3s; }
  .chip { font-size:12px; padding:3px 9px; border-radius:7px; font-weight:700; display:inline-block; }
  .task { display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid #f1f5f9; cursor:pointer; font-size:14px; }
  .check { width:22px; height:22px; border-radius:6px; border:2px solid #cbd5e1; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; }
  .banner { border-radius:14px; padding:14px; color:#fff; margin-bottom:12px; }
  .switch { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); color:#fff; font-size:11px; font-weight:700; padding:5px 10px; border-radius:8px; cursor:pointer; }
  .muted { color:#94a3b8; font-size:12px; }
  h3 { font-size:15px; font-weight:800; margin-bottom:10px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="firebase-config.js"></script>

<script>
// ════════════════════════════════════════════════════════════
//  트윈타워 상황대응 — 단계1 (데모 + Firebase 실시간 겸용)
//  firebase-config.js 가 채워지면 자동 LIVE(다기기 실시간),
//  비어 있으면 데모(이 기기 전용)로 동작.
// ════════════════════════════════════════════════════════════

const TEAM_COLOR = { '지휘반':'#185FA5','대응반':'#A32D2D','유도반':'#BA7517','상황실':'#0F6E56','지원반':'#534AB7' };
const ROSTER = [
  { empNo:'B-1001', name:'한지휘', team:'지휘반', role:'지휘자' },
  { empNo:'B-1002', name:'오부장', team:'지휘반', role:'부지휘' },
  { empNo:'B-2041', name:'김재난', team:'대응반', role:'통제자' },
  { empNo:'B-2042', name:'이대응', team:'대응반', role:'대응조' },
  { empNo:'B-2043', name:'박소방', team:'대응반', role:'대응조' },
  { empNo:'B-3001', name:'정유도', team:'유도반', role:'대피조' },
  { empNo:'B-3002', name:'한대피', team:'유도반', role:'대피조' },
  { empNo:'B-4001', name:'상황A', team:'상황실', role:'상황실' },
  { empNo:'B-4002', name:'상황B', team:'상황실', role:'상황실' },
  { empNo:'B-5001', name:'최지원', team:'지원반', role:'지원조' },
];
const FIRE_TASKS = {
  '지휘반': ['상황 판단·지휘','유관기관 신고 지시','증대 발령 판단'],
  '대응반': ['현장 출동·상태 보고','초기 소화·관계자 대피','대피유도 지시·출입통제','정상화 확인 보고'],
  '유도반': ['층별 대피 방송','피난계단 유도','인원 점검'],
  '상황실': ['수신기 확인·발신기','비상방송 송출','관계기관 통보'],
  '지원반': ['응급조치·이송 지원','진입로 확보'],
};
const FIRE_EQUIP = ['방독면','무전기','안전모','랜턴','손전등'];
const MODES = {
  '훈련':   { color:'#185FA5', scope:'drill',   teams:Object.keys(TEAM_COLOR), desc:'연습 출동 (기록 별도 보관)' },
  '감지기': { color:'#BA7517', scope:'confirm', teams:['대응반'],              desc:'확인조만 출동 (오작동 대비)' },
  '실제':   { color:'#A32D2D', scope:'all',     teams:Object.keys(TEAM_COLOR), desc:'전 조직 즉시 출동' },
};
const STATUS_COLOR = { '미응답':'#94a3b8','출동중':'#BA7517','현장':'#185FA5','복귀':'#0F6E56' };

// ──────────── 상태 (view model) ────────────
let state = { user:null, view:'auto', incident:null, responders:{}, tasks:{}, log:[] };
let BK = null;       // 백엔드 (데모 | firebase)
let MODE_LABEL = 'DEMO';

function sessionSave(){ try{ localStorage.setItem('tt_ops_session', JSON.stringify({ user:state.user, view:state.view })); }catch(e){} }
function sessionLoad(){ try{ const s=JSON.parse(localStorage.getItem('tt_ops_session')); if(s){ state.user=s.user||null; state.view=s.view||'auto'; } }catch(e){} }
function logEvent(action, detail){ state.log.unshift({ ts:Date.now(), actor: state.user?state.user.empNo:'-', action, detail }); if(state.log.length>200) state.log.pop(); }

// ──────────── 데모 백엔드 (localStorage) ────────────
const DemoBackend = {
  mode:'demo',
  start(){ try{ const s=JSON.parse(localStorage.getItem('tt_ops_shared')); if(s){ state.incident=s.incident||null; state.responders=s.responders||{}; state.tasks=s.tasks||{}; } }catch(e){} render(); },
  _p(){ try{ localStorage.setItem('tt_ops_shared', JSON.stringify({ incident:state.incident, responders:state.responders, tasks:state.tasks })); }catch(e){} render(); },
  setIncident(inc){ state.incident=inc; state.responders={}; state.tasks={}; this._p(); },
  patchIncident(p){ if(state.incident) Object.assign(state.incident, p); this._p(); },
  clearIncident(){ state.incident=null; state.responders={}; state.tasks={}; this._p(); },
  setResponder(e,d){ state.responders[e]=d; this._p(); },
  setTask(id,d){ state.tasks[id]=d; this._p(); },
  delTask(id){ delete state.tasks[id]; this._p(); },
};

// ──────────── Firebase 백엔드 (모듈러 SDK · named DB 지원) ────────────
async function makeFirebaseBackend(cfg){
  const [appMod, authMod, fs] = await Promise.all([
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'),
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'),
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'),
  ]);
  const app = appMod.initializeApp(cfg);
  try { await authMod.signInAnonymously(authMod.getAuth(app)); }
  catch(e){ alert('Firebase 인증 실패: ' + e.message + '\n(콘솔 → Authentication → 익명 로그인 활성화)'); }
  const db = cfg.databaseId ? fs.getFirestore(app, cfg.databaseId) : fs.getFirestore(app);
  window.__fs = fs; window.__db = db;   // 디버그용
  // FCM(푸시) 모듈 — 실패해도 앱은 정상 동작
  try {
    const msg = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js');
    window.__fcm = { messaging: msg.getMessaging(app), getToken: msg.getToken, onMessage: msg.onMessage, fs, db };
  } catch(e){ console.warn('FCM 모듈 로드 실패(푸시 비활성):', e.message); }
  const incRef  = fs.doc(db, 'incidents', 'active');
  const respCol = fs.collection(db, 'incidents', 'active', 'responders');
  const taskCol = fs.collection(db, 'incidents', 'active', 'tasks');
  async function wipe(col){ const sn = await fs.getDocs(col); const b = fs.writeBatch(db); sn.forEach(x => b.delete(x.ref)); await b.commit(); }
  return {
    mode:'firebase',
    start(){
      fs.onSnapshot(incRef,  s => { const d=s.data(); state.incident = (d && d.status==='active') ? d : null; render(); }, e=>console.error('inc',e));
      fs.onSnapshot(respCol, s => { const r={}; s.forEach(x => r[x.id]=x.data()); state.responders=r; render(); }, e=>console.error('resp',e));
      fs.onSnapshot(taskCol, s => { const t={}; s.forEach(x => t[x.id]=x.data()); state.tasks=t; render(); }, e=>console.error('task',e));
    },
    async setIncident(inc){ await wipe(respCol); await wipe(taskCol); await fs.setDoc(incRef, inc); },
    async patchIncident(p){ await fs.updateDoc(incRef, p); },
    async clearIncident(){ await fs.setDoc(incRef, { status:'closed' }, { merge:true }); },
    async setResponder(e,d){ await fs.setDoc(fs.doc(respCol, e), d); },
    async setTask(id,d){ await fs.setDoc(fs.doc(taskCol, id), d); },
    async delTask(id){ await fs.deleteDoc(fs.doc(taskCol, id)); },
  };
}

async function bootBackend(){
  const cfg = window.FIREBASE_CONFIG;
  if (cfg && cfg.apiKey){
    try { MODE_LABEL='LIVE'; BK = await makeFirebaseBackend(cfg); BK.start(); render(); }
    catch(e){ alert('Firebase 연결 실패 → 데모 모드\n' + e.message); MODE_LABEL='DEMO'; BK = DemoBackend; BK.start(); }
  } else { BK = DemoBackend; BK.start(); }
}

// ════════════════ 액션 (백엔드 무관) ════════════════
function login(empNo, name){
  const r = ROSTER.find(x => x.empNo === empNo);
  if (!r) return alert('사번을 선택하세요.');
  state.user = { empNo:r.empNo, name:r.name, team:r.team, role:r.role };
  state.view = (r.role === '지휘자' || r.role === '부지휘') ? 'cmd' : 'responder';
  sessionSave(); render();
  if (BK && BK.mode === 'firebase') enablePush(false);
}

// 알림 권한 상태
function pushGranted(){ return ('Notification' in window) && Notification.permission === 'granted'; }

// '알림 켜기' 배너 (firebase 모드 + 미허용일 때 표시)
function pushBanner(){
  if (!(BK && BK.mode === 'firebase') || pushGranted()) return '';
  return `<div onclick="enablePush(true)" style="background:#fef3c7;border:1px solid #fcd34d;
    color:#854d0e;border-radius:10px;padding:11px 12px;margin-bottom:12px;font-size:13px;
    font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;">
    🔔 발령 알림 받기 — 눌러서 켜기</div>`;
}

// FCM 푸시 등록 — 알림 권한 + 토큰 저장. interactive=true면 결과를 알림창으로 안내
async function enablePush(interactive){
  try {
    if (!('Notification' in window)){ if(interactive) alert('이 환경은 웹 알림을 지원하지 않습니다.\niOS는 Safari "공유 → 홈 화면에 추가" 후 그 아이콘으로 열어야 알림이 됩니다.'); return; }
    const F = window.__fcm;
    if (!F || !F.messaging){ if(interactive) alert('푸시 모듈이 아직 준비 중이거나 미지원 환경입니다.\n(iOS는 홈 화면 설치 필요. 잠시 후 다시 눌러보세요.)'); return; }
    if (!window.FIREBASE_CONFIG.vapidKey){ if(interactive) alert('서버 푸시 키(vapidKey)가 없습니다.'); return; }
    let perm = Notification.permission;
    if (perm === 'default') perm = await Notification.requestPermission();
    if (perm === 'denied'){ if(interactive) alert('알림이 차단돼 있습니다.\n브라우저 주소창 옆 자물쇠/사이트 설정에서 "알림"을 허용으로 바꿔주세요.'); return; }
    if (perm !== 'granted') return;
    const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    const token = await F.getToken(F.messaging, { vapidKey: window.FIREBASE_CONFIG.vapidKey, serviceWorkerRegistration: reg });
    if (!token || !state.user) return;
    await F.fs.setDoc(F.fs.doc(F.db, 'fcmTokens', token),
      { empNo:state.user.empNo, name:state.user.name, team:state.user.team, updatedAt:Date.now() });
    F.onMessage(F.messaging, (payload) => {
      const n = payload.notification || {};
      try { new Notification(n.title || '발령', { body: n.body || '' }); } catch(e){}
    });
    console.log('FCM 토큰 등록 완료:', token.slice(0,12) + '...');
    if (interactive) alert('✅ 알림이 켜졌습니다. 이제 발령 시 푸시를 받습니다.');
    render();
  } catch(e){ if(interactive) alert('알림 설정 실패: ' + e.message); console.warn('enablePush:', e.message); }
}
function logout(){ state.user = null; sessionSave(); render(); }
function setView(v){ state.view = v; sessionSave(); render(); }

function declareIncident(mode, location){
  if (!location.trim()) return alert('위치를 입력하세요.');
  const m = MODES[mode];
  const inc = { type:'화재', mode, location:location.trim(), status:'active',
    scope:m.scope, targetTeams:[...m.teams], declaredBy:state.user.empNo, declaredAt:Date.now(), escalations:[] };
  logEvent('declare', `화재 발령 [${mode}] · ${location.trim()}`);
  BK.setIncident(inc);
}
function escalate(){
  if (!state.incident || state.incident.mode === '실제') return;
  const from = state.incident.mode;
  const escalations = (state.incident.escalations||[]).concat([{ from, to:'실제', by:state.user.empNo, at:Date.now() }]);
  logEvent('escalate', `${from} → 실제 승격 (전원 재출동)`);
  BK.patchIncident({ mode:'실제', scope:'all', targetTeams:[...MODES['실제'].teams], escalations });
}
function closeIncident(){ if (!confirm('상황을 종료할까요?')) return; logEvent('close','상황 종료'); BK.clearIncident(); }
function setMyStatus(s){ if (!state.incident) return; logEvent('status', `출동상태 → ${s}`); BK.setResponder(state.user.empNo, { empNo:state.user.empNo, name:state.user.name, team:state.user.team, role:state.user.role, status:s, updatedAt:Date.now() }); }
function toggleTask(team, i){
  const id = team + '-' + i;
  if (state.tasks[id] && state.tasks[id].done){ logEvent('task','취소: '+FIRE_TASKS[team][i]); BK.delTask(id); }
  else { logEvent('task','완료: '+FIRE_TASKS[team][i]); BK.setTask(id, { team, idx:i, label:FIRE_TASKS[team][i], done:true, by:state.user.empNo, byName:state.user.name, at:Date.now() }); }
}

// ════════════════ 집계 ════════════════
function targetRoster(){ if (!state.incident) return []; return ROSTER.filter(r => state.incident.targetTeams.includes(r.team)); }
function myStatus(){ const r = state.responders[state.user.empNo]; return r ? r.status : '미응답'; }
function teamTaskPct(team){ const total=(FIRE_TASKS[team]||[]).length; if(!total) return 0; let done=0; for(let i=0;i<total;i++) if(state.tasks[team+'-'+i]) done++; return Math.round(done/total*100); }

// ════════════════ 렌더 ════════════════
const el = document.getElementById('app');
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function time(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,'0'); return `${p(d.getHours())}:${p(d.getMinutes())}`; }
function badge(){ return `<span class="demo-badge ${MODE_LABEL==='LIVE'?'live-badge':''}">${MODE_LABEL}</span>`; }

function render(){
  if (!state.user) return renderLogin();
  if (state.view === 'cmd') return renderCommand();
  return renderResponder();
}
function topbar(cmd){
  const u = state.user;
  const other = state.view === 'cmd' ? 'responder' : 'cmd';
  const otherLabel = state.view === 'cmd' ? '대원 화면' : '지휘 화면';
  return `<div class="topbar ${cmd?'cmd':''}">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:800;">트윈타워 상황대응 ${badge()}</div>
        <div style="font-size:11px;opacity:.85;margin-top:2px;">${esc(u.name)} · ${esc(u.team)} ${esc(u.role)}</div>
      </div>
      <button class="switch" onclick="setView('${other}')">${otherLabel}</button>
      <button class="switch" onclick="logout()">로그아웃</button>
    </div></div>`;
}
function renderLogin(){
  const opts = ROSTER.map(r => `<option value="${r.empNo}">${r.empNo} · ${r.team} ${r.role} (${r.name})</option>`).join('');
  el.innerHTML = `
  <div class="topbar"><div style="font-size:16px;font-weight:800;">🔥 트윈타워 상황대응 ${badge()}</div>
    <div style="font-size:11px;opacity:.85;margin-top:3px;">재난 협업 · 단계1</div></div>
  <div class="content">
    <div class="card">
      <h3>로그인</h3>
      <label>이름</label>
      <input id="lg-name" placeholder="이름 입력" autocomplete="off" style="margin-bottom:12px;">
      <label>사번 선택</label>
      <select id="lg-emp" style="margin-bottom:14px;"><option value="">사번을 선택하세요</option>${opts}</select>
      <div id="lg-role" class="chip" style="background:#e0f2fe;color:#0c4a6e;margin-bottom:14px;display:none;"></div>
      <button class="btn btn-red" onclick="login(document.getElementById('lg-emp').value, document.getElementById('lg-name').value)">로그인</button>
    </div>
    <div class="muted" style="text-align:center;line-height:1.7;">
      ${MODE_LABEL==='LIVE' ? '실시간 모드 — 여러 기기가 공유됩니다.' : '데모 모드 — 이 기기에서만 동작합니다.'}
    </div>
  </div>`;
  const sel=document.getElementById('lg-emp'), roleBox=document.getElementById('lg-role'), nameI=document.getElementById('lg-name');
  sel.onchange = () => { const r=ROSTER.find(x=>x.empNo===sel.value); if(r){ roleBox.style.display='inline-block'; roleBox.textContent=`${r.team} · ${r.role} (자동 배정)`; nameI.value=r.name; } else roleBox.style.display='none'; };
}
function renderResponder(){
  const inc = state.incident; let body;
  if (!inc){
    body = `<div class="card" style="text-align:center;padding:30px 14px;"><div style="font-size:34px;">🟢</div>
      <div style="font-weight:800;margin:8px 0 4px;">현재 발령 없음</div><div class="muted">발령 시 이 화면에 상황이 표시됩니다.</div></div>`;
  } else {
    const m = MODES[inc.mode]; const st = myStatus();
    const stBtn = ['미응답','출동중','현장','복귀'].map(s => `<button onclick="setMyStatus('${s}')" style="${st===s?`background:${STATUS_COLOR[s]};color:#fff;`:''}">${s}</button>`).join('');
    const tasks = (FIRE_TASKS[state.user.team]||[]).map((t,i) => { const ok=!!state.tasks[state.user.team+'-'+i];
      return `<div class="task" onclick="toggleTask('${state.user.team}',${i})"><div class="check" style="${ok?`background:${TEAM_COLOR[state.user.team]};border-color:${TEAM_COLOR[state.user.team]};`:''}">${ok?'✓':''}</div><span style="${ok?'color:#94a3b8;text-decoration:line-through;':''}">${esc(t)}</span></div>`; }).join('');
    const inScope = inc.targetTeams.includes(state.user.team);
    body = `
    <div class="banner" style="background:${m.color};"><div style="display:flex;align-items:center;gap:8px;"><div style="font-size:22px;">🔥</div>
      <div style="flex:1;"><div style="font-weight:800;">화재 발령 <span class="chip" style="background:#fff;color:${m.color};">${inc.mode}</span></div>
      <div style="font-size:12px;opacity:.9;margin-top:2px;">${esc(inc.location)} · ${time(inc.declaredAt)}</div></div></div>
      <div style="font-size:12px;margin-top:8px;opacity:.95;">${m.desc}</div></div>
    ${inScope ? `
    <div class="card"><label>내 출동 체크</label><div class="seg">${stBtn}</div></div>
    <div class="card"><label style="color:${m.color};">🧰 화재 비상장구 착용</label><div>${FIRE_EQUIP.map(e=>`<span class="chip" style="background:#fdecec;color:#791f1f;margin:3px 4px 0 0;">${e}</span>`).join('')}</div></div>
    <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><h3 style="margin:0;">내 임무 · ${esc(state.user.team)}</h3><span class="chip" style="background:#f0fdf4;color:#15803d;">${teamTaskPct(state.user.team)}%</span></div>${tasks}</div>`
    : `<div class="card" style="text-align:center;color:#64748b;">이번 ${inc.mode} 상황은 <b>${inc.targetTeams.join('·')}</b> 대상입니다. 대기해 주세요.</div>`}`;
  }
  el.innerHTML = topbar(false) + `<div class="content">${pushBanner()}${body}</div>`;
}
function renderCommand(){
  const inc = state.incident; let body;
  if (!inc){
    const modeBtns = Object.keys(MODES).map(k => { const m=MODES[k];
      return `<div class="mode-opt" data-mode="${k}" onclick="selMode('${k}')" style="${k==='실제'?`border-color:${m.color};background:#fdecec;color:#791f1f;`:''}">
        <span>${k==='훈련'?'🎓':k==='감지기'?'🔔':'⚠️'}</span><span>${k==='감지기'?'감지기 동작':k==='실제'?'실제 화재':'훈련'}</span>
        <span style="margin-left:auto;font-size:12px;font-weight:600;opacity:.7;">${m.desc}</span></div>`; }).join('');
    el.innerHTML = topbar(true) + `<div class="content">${pushBanner()}<div class="card"><h3>🔥 화재 발령</h3>
      <label>상황 유형</label><div id="mode-list">${modeBtns}</div>
      <label style="margin-top:12px;">위치</label><input id="dc-loc" value="동관 E27F" style="margin-bottom:14px;">
      <button class="btn btn-red" onclick="declareIncident(window._selMode||'실제', document.getElementById('dc-loc').value)">발령 전송</button></div>
      <div class="muted" style="text-align:center;">발령 시 대상 조직에 푸시 알림이 전송됩니다 (LIVE 모드).</div></div>`;
    window._selMode = '실제'; return;
  }
  const m = MODES[inc.mode]; const tr = targetRoster();
  const dispatched = tr.filter(r => { const s=state.responders[r.empNo]; return s && s.status!=='미응답'; }).length;
  const onScene = tr.filter(r => { const s=state.responders[r.empNo]; return s && s.status==='현장'; }).length;
  const totalPct = (() => { let d=0,t=0; inc.targetTeams.forEach(tm=>{(FIRE_TASKS[tm]||[]).forEach((_,i)=>{t++; if(state.tasks[tm+'-'+i])d++;});}); return t?Math.round(d/t*100):0; })();
  const teamBars = inc.targetTeams.filter(t=>FIRE_TASKS[t]).map(t => { const p=teamTaskPct(t);
    return `<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>${t}</span><span class="muted">${p}%</span></div><div class="bar"><div style="width:${p}%;background:${p>=80?'#16a34a':p>=50?'#185FA5':'#BA7517'};"></div></div></div>`; }).join('');
  const roster = tr.map(r => { const s=(state.responders[r.empNo]||{}).status||'미응답';
    return `<div class="row"><div class="dot" style="background:${STATUS_COLOR[s]};"></div><span style="flex:1;font-size:14px;">${esc(r.name)} · <span class="muted">${r.team} ${r.role}</span></span><span class="chip" style="background:${STATUS_COLOR[s]}22;color:${STATUS_COLOR[s]};">${s}</span></div>`; }).join('');
  body = `
    <div class="banner" style="background:${m.color};"><div style="display:flex;align-items:center;gap:8px;"><div style="font-size:22px;">🗺️</div>
      <div style="flex:1;"><div style="font-weight:800;">화재 상황판 <span class="chip" style="background:#fff;color:${m.color};">${inc.mode}</span></div>
      <div style="font-size:12px;opacity:.9;margin-top:2px;">${esc(inc.location)} · 발령 ${time(inc.declaredAt)}</div></div></div></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <div class="metric"><div class="muted">출동</div><div class="v">${dispatched}<span class="muted" style="font-size:12px;">/${tr.length}</span></div></div>
      <div class="metric"><div class="muted">현장</div><div class="v" style="color:#185FA5;">${onScene}</div></div>
      <div class="metric"><div class="muted">임무율</div><div class="v" style="color:#16a34a;">${totalPct}%</div></div></div>
    ${inc.mode!=='실제' ? `<button class="btn btn-red" style="margin-bottom:12px;" onclick="escalate()">⚠️ 실제 화재로 승격 (전원 재출동)</button>` : ''}
    <div class="card"><h3>조별 임무율</h3>${teamBars||'<div class="muted">대상 조 없음</div>'}</div>
    <div class="card"><h3>출동 인원 체크 (${inc.mode})</h3>${roster}</div>
    <button class="btn btn-gray" onclick="closeIncident()">상황 종료</button>`;
  el.innerHTML = topbar(true) + `<div class="content">${pushBanner()}${body}</div>`;
}
function selMode(k){ window._selMode=k; document.querySelectorAll('#mode-list .mode-opt').forEach(o => { const on=o.dataset.mode===k; const col=MODES[o.dataset.mode].color; o.style.borderColor=on?col:'transparent'; o.style.background=on?col+'18':'#f1f5f9'; o.style.color=on?col:'#64748b'; }); }

// ──────────── 부팅 ────────────
sessionLoad();
render();
bootBackend();
</script>
</body>
</html>
